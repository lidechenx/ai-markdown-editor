# 部署到 GitHub Pages（Actions）
#
# 若 deploy 报 404 / Failed to create deployment：
# 1. 打开 https://github.com/lidechenx/ai-markdown-editor/settings/pages
# 2. Build and deployment → Source 选「GitHub Actions」（不要选 Deploy from a branch）
# 3. 保存后：Actions → 本 workflow → Run workflow，或向 main 再 push 一次

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 与官方 static Pages 模板一致：upload v3 + deploy v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
